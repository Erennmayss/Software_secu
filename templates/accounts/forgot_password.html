<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié - Biodelice</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1e3d2a;
      --orange: #e8621a;
      --card-bg: rgba(255, 255, 255, 0.05);
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
      text-align: center;
    }
    p.subtitle {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 25px;
    }
    .field {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 0.8rem;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.8);
    }
    input {
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus {
      border-color: var(--orange);
    }
    button {
      width: 100%;
      padding: 12px;
      background: var(--orange);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    button:hover { background: #cf5414; }
    button:disabled { background: #7a7a7a; cursor: not-allowed; }
    
    .error-msg {
      color: #ff6b6b;
      font-size: 0.8rem;
      margin-bottom: 15px;
      text-align: center;
      display: none;
    }
    .links {
      margin-top: 20px;
      text-align: center;
      font-size: 0.8rem;
    }
    .links a {
      color: var(--orange);
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
    
    /* Étapes d'affichage */
    #step-2, #step-success { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <!-- ÉTAPE 1 : Demande de l'email -->
    <div id="step-1">
      <h1>Mot de passe oublié</h1>
      <p class="subtitle">Entrez votre e-mail, nous vous enverrons un code de récupération à 6 chiffres.</p>
      <div class="error-msg" id="error-1"></div>
      <div class="field">
        <label>Adresse e-mail</label>
        <input type="email" id="email" placeholder="vous@exemple.com" required>
      </div>
      <button id="btn-request" onclick="requestCode()">Envoyer le code</button>
      <div class="links"><a href="{% url 'accounts:login' %}">Retour à la connexion</a></div>
    </div>

    <!-- ÉTAPE 2 : Saisie du code et nouveau mot de passe -->
    <div id="step-2">
      <h1>Nouveau mot de passe</h1>
      <p class="subtitle">Veuillez entrer le code reçu par e-mail et votre nouveau mot de passe.</p>
      <div class="error-msg" id="error-2"></div>
      <div class="field">
        <label>Code à 6 chiffres</label>
        <input type="text" id="code" placeholder="123456" maxlength="6" required>
      </div>
      <div class="field">
        <label>Nouveau mot de passe</label>
        <input type="password" id="new_pwd" placeholder="8 caractères minimum" required>
      </div>
      <button id="btn-confirm" onclick="confirmCode()">Enregistrer</button>
    </div>

    <!-- ÉTAPE 3 : Succès -->
    <div id="step-success" style="text-align: center;">
      <h1>Succès !</h1>
      <p class="subtitle">Votre mot de passe a été modifié avec succès.</p>
      <button onclick="window.location.href='{% url 'accounts:login' %}'">Se connecter</button>
    </div>
  </div>

  {% csrf_token %}
  <script>
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    async function requestCode() {
      const email = document.getElementById('email').value;
      if(!email) return;
      
      document.getElementById('btn-request').disabled = true;
      
      // On simule une réussite pour des raisons de sécurité (ne pas dévoiler si l'email existe ou non)
      await fetch("{% url 'accounts:request_reset_code' %}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ email: email })
      });
      
      document.getElementById('step-1').style.display = 'none';
      document.getElementById('step-2').style.display = 'block';
    }

    async function confirmCode() {
      const code = document.getElementById('code').value;
      const new_pwd = document.getElementById('new_pwd').value;
      const email = document.getElementById('email').value;
      
      const res = await fetch("{% url 'accounts:confirm_reset_code' %}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ email: email, code: code, new_password: new_pwd })
      });
      
      const data = await res.json();
      if(data.success) {
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-success').style.display = 'block';
      } else {
        const err = document.getElementById('error-2');
        err.textContent = data.error;
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
