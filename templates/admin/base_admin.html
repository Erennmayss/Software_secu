<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Biodelice Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0d1f14;
      --bg-soft:#12291d;
      --panel:#162b1e;
      --panel-2:#1a3024;
      --panel-3:#1f3829;
      --border:rgba(255,255,255,0.08);
      --border-strong:rgba(255,255,255,0.14);
      --glass:rgba(255,255,255,0.05);
      --glass-2:rgba(255,255,255,0.08);
      --text:#f4f6f3;
      --muted:rgba(255,255,255,0.62);
      --muted-2:rgba(255,255,255,0.4);
      --accent:#e8621a;
      --accent-soft:rgba(232,98,26,0.16);
      --accent-glow:rgba(232,98,26,0.28);
      --success:#4fb87d;
      --danger:#ff7a6b;
      --warning:#f7bf63;
      --radius:18px;
      --radius-md:14px;
      --radius-sm:12px;
      --shadow-lg:0 24px 80px rgba(0,0,0,0.38);
      --shadow-md:0 14px 40px rgba(0,0,0,0.22);
      --shadow-sm:0 8px 24px rgba(0,0,0,0.16);
      --sidebar-width:250px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(232,98,26,0.09), transparent 22%),
        radial-gradient(circle at left 20%, rgba(79,184,125,0.08), transparent 28%),
        linear-gradient(180deg, #102417 0%, var(--bg) 100%);
      font-family:'Poppins',sans-serif;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image:linear-gradient(180deg, rgba(0,0,0,0.55), transparent 95%);
      pointer-events:none;
      z-index:-1;
    }

    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}

    .admin-shell{display:flex;min-height:100vh}
    .admin-main{
      flex:1;
      margin-left:var(--sidebar-width);
      min-width:0;
      padding:26px 26px 100px;
    }

    .sidebar{
      position:fixed;
      inset:0 auto 0 0;
      width:var(--sidebar-width);
      padding:24px 18px;
      background:rgba(15,34,23,0.92);
      backdrop-filter:blur(18px);
      border-right:1px solid var(--border);
      box-shadow:var(--shadow-md);
      display:flex;
      flex-direction:column;
      gap:20px;
      z-index:50;
    }

    .sidebar-logo{
      font-family:'Playfair Display',serif;
      font-size:1.7rem;
      font-weight:700;
      letter-spacing:0.02em;
      padding:4px 10px;
    }

    .sidebar-logo span{color:var(--accent)}
    .sidebar-subtitle{
      color:var(--muted);
      font-size:0.82rem;
      padding:0 10px;
      margin-top:-12px;
    }

    .sidebar-group-title{
      font-size:0.72rem;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:var(--muted-2);
      padding:0 10px;
      margin-bottom:2px;
    }

    .sidebar-nav{display:flex;flex-direction:column;gap:8px}
    .sidebar-link{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      border-radius:14px;
      color:rgba(255,255,255,0.78);
      border:1px solid transparent;
      transition:transform .22s ease, background .22s ease, border-color .22s ease, color .22s ease, box-shadow .22s ease;
    }

    .sidebar-link:hover{
      transform:translateX(4px);
      background:rgba(255,255,255,0.05);
      border-color:var(--border);
      color:#fff;
    }

    .sidebar-link.active{
      background:linear-gradient(135deg, rgba(232,98,26,0.18), rgba(255,255,255,0.04));
      border-color:rgba(232,98,26,0.22);
      color:#fff;
      box-shadow:0 10px 22px rgba(0,0,0,0.16);
    }

    .sidebar-icon{
      width:34px;
      height:34px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      font-size:0.95rem;
      flex-shrink:0;
    }

    .sidebar-link.active .sidebar-icon{
      background:var(--accent-soft);
      border-color:rgba(232,98,26,0.22);
      color:#fff;
    }

    .sidebar-note{
      margin-top:auto;
      padding:16px;
      border-radius:18px;
      background:linear-gradient(145deg, rgba(232,98,26,0.14), rgba(255,255,255,0.04));
      border:1px solid rgba(232,98,26,0.16);
      box-shadow:var(--shadow-sm);
    }

    .sidebar-note strong{
      display:block;
      font-size:0.88rem;
      margin-bottom:6px;
    }

    .sidebar-note p{
      margin:0;
      font-size:0.77rem;
      color:var(--muted);
      line-height:1.55;
    }

    .topbar{
      position:sticky;
      top:16px;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:14px 18px;
      margin-bottom:24px;
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(22,43,30,0.72);
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow-sm);
    }

    .topbar-search{
      display:flex;
      align-items:center;
      gap:12px;
      flex:1;
      min-width:0;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
    }

    .topbar-search input{
      width:100%;
      color:#fff;
      background:transparent;
      border:none;
      outline:none;
    }

    .topbar-search input::placeholder,
    .control::placeholder,
    textarea::placeholder{color:rgba(255,255,255,0.38)}

    .topbar-actions{display:flex;align-items:center;gap:12px}
    .icon-btn,
    .profile-btn{
      border:none;
      color:#fff;
      cursor:pointer;
      transition:transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .icon-btn{
      width:44px;
      height:44px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border);
    }

    .icon-btn:hover,
    .profile-btn:hover{transform:translateY(-1px);background:rgba(255,255,255,0.08)}

    .profile-wrap{position:relative}
    .profile-btn{
      display:flex;
      align-items:center;
      gap:10px;
      padding:7px 10px 7px 7px;
      border-radius:16px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border);
    }

    .avatar{
      width:38px;
      height:38px;
      border-radius:14px;
      display:grid;
      place-items:center;
      font-weight:600;
      background:linear-gradient(135deg, rgba(232,98,26,0.34), rgba(255,255,255,0.06));
      border:1px solid rgba(232,98,26,0.18);
    }

    .profile-meta{line-height:1.15;text-align:left}
    .profile-meta strong{display:block;font-size:0.84rem}
    .profile-meta span{font-size:0.74rem;color:var(--muted)}

    .profile-menu{
      position:absolute;
      top:calc(100% + 10px);
      right:0;
      min-width:220px;
      padding:10px;
      border-radius:16px;
      border:1px solid var(--border);
      background:rgba(20,39,27,0.94);
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow-md);
      opacity:0;
      visibility:hidden;
      transform:translateY(8px);
      transition:opacity .2s ease, transform .2s ease, visibility .2s ease;
    }

    .profile-wrap.open .profile-menu{
      opacity:1;
      visibility:visible;
      transform:translateY(0);
    }

    .profile-menu a{
      display:block;
      padding:11px 12px;
      border-radius:12px;
      color:rgba(255,255,255,0.8);
    }

    .profile-menu a:hover{background:rgba(255,255,255,0.05);color:#fff}

    .page-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      margin-bottom:24px;
    }

    .page-title{
      margin:0 0 8px;
      font-family:'Playfair Display',serif;
      font-size:2rem;
      font-weight:700;
      letter-spacing:0.01em;
    }

    .page-subtitle{
      margin:0;
      color:var(--muted);
      font-size:0.95rem;
      max-width:620px;
      line-height:1.6;
    }

    .page-actions{display:flex;gap:10px;flex-wrap:wrap}

    .btn,
    .chip,
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      white-space:nowrap;
    }

    .btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,0.05);
      color:#fff;
      padding:11px 16px;
      cursor:pointer;
      transition:transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,0.08);
      border-color:var(--border-strong);
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--accent), #ff7a36);
      border-color:rgba(232,98,26,0.4);
      box-shadow:0 12px 30px rgba(232,98,26,0.18);
    }

    .btn-primary:hover{
      background:linear-gradient(135deg, #f36a20, #ff8a4a);
      box-shadow:0 16px 38px rgba(232,98,26,0.24);
    }

    .btn-ghost{background:transparent}
    .btn-soft{background:var(--accent-soft);border-color:rgba(232,98,26,0.22);color:#ffb48a}

    .grid{display:grid;gap:18px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}

    .card{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.03));
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow-sm);
    }

    .card::after{
      content:"";
      position:absolute;
      inset:auto -40% -60% auto;
      width:180px;
      height:180px;
      background:radial-gradient(circle, rgba(232,98,26,0.11), transparent 68%);
      pointer-events:none;
    }

    .card-header,
    .card-body{padding:18px 18px 0}
    .card-footer{padding:18px}
    .card:last-child{margin-bottom:0}
    .card-content{padding:18px}
    .card-title{
      margin:0;
      font-size:1rem;
      font-weight:600;
    }
    .card-kicker{
      font-size:0.72rem;
      text-transform:uppercase;
      letter-spacing:0.11em;
      color:var(--muted-2);
      margin-bottom:8px;
    }

    .section-stack{display:flex;flex-direction:column;gap:18px}

    .chip{
      padding:8px 12px;
      font-size:0.78rem;
      color:#fff;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
    }

    .chip.accent{background:rgba(232,98,26,0.14);border-color:rgba(232,98,26,0.2);color:#ffba92}
    .chip.success{background:rgba(79,184,125,0.14);border-color:rgba(79,184,125,0.18);color:#9be0b7}
    .chip.warning{background:rgba(247,191,99,0.14);border-color:rgba(247,191,99,0.18);color:#f4d48f}

    .badge{
      padding:6px 10px;
      font-size:0.74rem;
      font-weight:600;
      border:1px solid transparent;
    }

    .badge-published,.badge-active,.badge-admin,.badge-a{
      background:rgba(79,184,125,0.14);
      border-color:rgba(79,184,125,0.18);
      color:#98dfb3;
    }

    .badge-draft,.badge-inactive{
      background:rgba(255,255,255,0.06);
      border-color:rgba(255,255,255,0.09);
      color:rgba(255,255,255,0.72);
    }

    .badge-user,.badge-b{
      background:rgba(232,98,26,0.14);
      border-color:rgba(232,98,26,0.18);
      color:#ffb68c;
    }

    .badge-c{background:rgba(247,191,99,0.14);border-color:rgba(247,191,99,0.18);color:#f2d086}
    .badge-d{background:rgba(255,122,107,0.14);border-color:rgba(255,122,107,0.18);color:#ffb4ab}
    .badge-e{background:rgba(208,75,75,0.18);border-color:rgba(208,75,75,0.2);color:#ffc6c6}

    .kpi-card{
      padding:18px;
      min-height:148px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .kpi-card:hover{
      transform:translateY(-4px);
      border-color:rgba(232,98,26,0.18);
      box-shadow:var(--shadow-md);
    }

    .kpi-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }

    .kpi-icon{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, rgba(232,98,26,0.16), rgba(255,255,255,0.06));
      border:1px solid rgba(232,98,26,0.16);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .kpi-label{font-size:0.84rem;color:var(--muted)}
    .kpi-value{
      margin-top:12px;
      font-size:2rem;
      line-height:1;
      font-weight:700;
      font-family:'Playfair Display',serif;
    }
    .kpi-trend{font-size:0.82rem;color:var(--muted)}
    .trend-up{color:#9de3b8}
    .trend-down{color:#ffc2b8}

    .chart-box{
      padding:18px;
      min-height:320px;
    }

    .chart-placeholder{
      height:240px;
      margin-top:18px;
      display:flex;
      align-items:flex-end;
      gap:14px;
      padding:18px;
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.06);
    }

    .bar{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .bar-fill{
      width:100%;
      border-radius:14px 14px 8px 8px;
      background:linear-gradient(180deg, #ff8747 0%, var(--accent) 100%);
      box-shadow:0 10px 24px rgba(232,98,26,0.18);
      min-height:32px;
    }

    .bar:nth-child(2) .bar-fill{background:linear-gradient(180deg, #6fd09c 0%, #3f9a68 100%)}
    .bar:nth-child(3) .bar-fill{background:linear-gradient(180deg, #ffd384 0%, #f4ae29 100%)}
    .bar:nth-child(4) .bar-fill{background:linear-gradient(180deg, #9dd5b3 0%, #58b67d 100%)}
    .bar-label{font-size:0.78rem;color:var(--muted)}
    .bar-value{font-size:0.78rem;font-weight:600}

    .line-chart{
      position:relative;
      height:240px;
      margin-top:18px;
      border-radius:16px;
      overflow:hidden;
      background:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      background-size:100% 20%, 14.28% 100%, 100% 100%;
      border:1px solid rgba(255,255,255,0.06);
    }

    .line-chart svg{position:absolute;inset:0;width:100%;height:100%}
    .line-chart .axis-labels{
      position:absolute;
      inset:auto 12px 12px;
      display:grid;
      grid-template-columns:repeat(7,1fr);
      color:var(--muted-2);
      font-size:0.74rem;
      text-align:center;
    }

    .table-wrap{
      overflow:auto;
      padding:0 18px 18px;
    }

    table{
      width:100%;
      min-width:760px;
      border-collapse:collapse;
    }

    th,td{
      padding:14px 12px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,0.06);
      vertical-align:middle;
    }

    th{
      color:var(--muted);
      font-size:0.76rem;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:0.09em;
    }

    tr:hover td{background:rgba(255,255,255,0.02)}

    .item-cell{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .thumb{
      width:54px;
      height:54px;
      border-radius:14px;
      object-fit:cover;
      background:linear-gradient(135deg, rgba(232,98,26,0.18), rgba(255,255,255,0.06));
      border:1px solid rgba(255,255,255,0.08);
      flex-shrink:0;
    }

    .thumb-lg{
      width:72px;
      height:72px;
      border-radius:18px;
    }

    .title-stack strong{display:block;font-size:0.9rem}
    .title-stack span{font-size:0.78rem;color:var(--muted)}

    .actions-row{display:flex;gap:8px;flex-wrap:wrap}
    .action-link{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:10px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.8);
      font-size:0.78rem;
      transition:background .2s ease, transform .2s ease;
    }

    .action-link:hover{
      background:rgba(255,255,255,0.08);
      transform:translateY(-1px);
      color:#fff;
    }

    .filters{
      padding:18px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
    }

    .field,
    .control,
    .textarea,
    .select{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);
      color:#fff;
      outline:none;
      transition:border-color .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .control,
    .select{padding:12px 14px;min-height:46px}
    .textarea{padding:14px;min-height:120px;resize:vertical}

    .control:focus,
    .textarea:focus,
    .select:focus{
      border-color:rgba(232,98,26,0.35);
      background:rgba(255,255,255,0.06);
      box-shadow:0 0 0 4px rgba(232,98,26,0.08);
    }

    .filter-grow{flex:1;min-width:220px}
    .filter-sm{width:160px}

    .switch{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:0.82rem;
      padding:0 4px;
    }

    .switch-track{
      position:relative;
      width:52px;
      height:30px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
    }

    .switch-track::after{
      content:"";
      position:absolute;
      top:3px;
      left:3px;
      width:22px;
      height:22px;
      border-radius:50%;
      background:#fff;
      transition:transform .2s ease;
      box-shadow:0 5px 14px rgba(0,0,0,0.22);
    }

    .switch.is-on .switch-track{
      background:rgba(232,98,26,0.18);
      border-color:rgba(232,98,26,0.22);
    }

    .switch.is-on .switch-track::after{transform:translateX(22px);background:var(--accent)}

    .segmented{
      display:inline-flex;
      padding:5px;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.07);
      gap:4px;
    }

    .segmented button{
      border:none;
      background:transparent;
      color:var(--muted);
      padding:9px 14px;
      border-radius:999px;
      cursor:pointer;
      transition:background .2s ease, color .2s ease;
    }

    .segmented button.active{
      background:rgba(232,98,26,0.16);
      color:#fff;
    }

    .cards-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:18px;
    }

    .recipe-card{
      overflow:hidden;
      transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .recipe-card:hover{
      transform:translateY(-5px) scale(1.01);
      box-shadow:var(--shadow-md);
      border-color:rgba(232,98,26,0.18);
    }

    .recipe-media{
      position:relative;
      height:176px;
      overflow:hidden;
    }

    .recipe-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .4s ease;
    }

    .recipe-card:hover .recipe-media img{transform:scale(1.05)}

    .recipe-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(13,31,20,0.08) 0%, rgba(13,31,20,0.84) 100%);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding:14px;
    }

    .recipe-body{padding:16px}
    .meta-row,
    .inline-stats{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .meta-row{margin-top:12px}
    .muted{color:var(--muted)}
    .tiny{font-size:0.76rem}
    .small{font-size:0.84rem}

    .timeline{padding:18px;display:flex;flex-direction:column;gap:16px}
    .timeline-item{
      position:relative;
      padding-left:24px;
    }

    .timeline-item::before{
      content:"";
      position:absolute;
      left:0;
      top:8px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 6px rgba(232,98,26,0.12);
    }

    .timeline-item::after{
      content:"";
      position:absolute;
      left:4px;
      top:24px;
      bottom:-14px;
      width:1px;
      background:rgba(255,255,255,0.09);
    }

    .timeline-item:last-child::after{display:none}
    .timeline-item strong{display:block;font-size:0.88rem}
    .timeline-item span{color:var(--muted);font-size:0.78rem}

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    .field-group{display:flex;flex-direction:column;gap:8px}
    .field-group label{
      font-size:0.8rem;
      font-weight:600;
      color:rgba(255,255,255,0.84);
    }

    .dynamic-list{display:flex;flex-direction:column;gap:12px}
    .dynamic-row{
      display:grid;
      grid-template-columns:1.5fr 1fr .8fr auto;
      gap:12px;
      align-items:center;
    }

    .step-row{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:12px;
      align-items:flex-start;
    }

    .step-handle,
    .ghost-badge{
      width:42px;
      min-width:42px;
      height:42px;
      border-radius:12px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);
      color:var(--muted);
    }

    .chips-wrap{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .pill-input{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      padding:10px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);
      min-height:52px;
    }

    .pill-input input{
      flex:1;
      min-width:110px;
      border:none;
      outline:none;
      background:transparent;
      color:#fff;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(232,98,26,0.14);
      border:1px solid rgba(232,98,26,0.18);
      font-size:0.78rem;
      color:#ffd2b8;
    }

    .preview-box{
      padding:16px;
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.06);
    }

    .logic-row{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .logic-row:last-child{border-bottom:none;padding-bottom:0}
    .logic-arrow{color:var(--accent);font-weight:700}

    .stats-strip{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }

    .mini-stat{
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
    }

    .mini-stat strong{
      display:block;
      font-size:1.2rem;
      font-family:'Playfair Display',serif;
      margin-top:6px;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(4,12,8,0.55);
      backdrop-filter:blur(10px);
      z-index:90;
    }

    .modal.show{display:flex}
    .modal-card{
      width:min(620px, 100%);
      padding:22px;
      border-radius:22px;
      border:1px solid var(--border);
      background:rgba(18,41,29,0.95);
      box-shadow:var(--shadow-lg);
    }

    .modal-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .modal-title{
      margin:0;
      font-family:'Playfair Display',serif;
      font-size:1.45rem;
    }

    .close-btn{
      border:none;
      background:rgba(255,255,255,0.06);
      color:#fff;
      width:40px;
      height:40px;
      border-radius:12px;
      cursor:pointer;
    }

    .sticky-bar{
      position:sticky;
      bottom:16px;
      z-index:20;
      margin-top:24px;
      padding:14px 16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(18,41,29,0.84);
      backdrop-filter:blur(16px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      box-shadow:var(--shadow-md);
    }

    .sticky-bar p{margin:0;color:var(--muted);font-size:0.84rem}
    .hide{display:none !important}
    .message-stack{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
    .message{
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.05);
      box-shadow:var(--shadow-sm);
    }
    .message.success{border-color:rgba(79,184,125,0.18);background:rgba(79,184,125,0.12)}
    .message.error{border-color:rgba(255,122,107,0.18);background:rgba(255,122,107,0.12)}

    @media (max-width: 1220px){
      .grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}
      .cards-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid-3{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media (max-width: 980px){
      .sidebar{
        position:static;
        width:100%;
        height:auto;
        border-right:none;
        border-bottom:1px solid var(--border);
      }
      .admin-shell{display:block}
      .admin-main{margin-left:0;padding:20px 16px 100px}
      .topbar{top:10px}
      .page-header{flex-direction:column}
      .grid-2,.grid-3,.grid-4,.cards-grid,.form-grid,.stats-strip{grid-template-columns:1fr}
      .dynamic-row,.step-row{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:stretch}
      .topbar-actions{justify-content:space-between}
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body data-admin-section="{% block admin_section %}{% endblock %}">
  <div class="admin-shell">
    {% include 'admin/admin_sidebar.html' %}

    <main class="admin-main">
      <div class="topbar">
        <label class="topbar-search">
          <span>⌕</span>
          <input type="text" placeholder="Search recipes, users, conditions..." />
        </label>

        <div class="topbar-actions">
          <button class="icon-btn" type="button" aria-label="Notifications">⎋</button>
          <button class="icon-btn" type="button" aria-label="Quick view">✦</button>

          <div class="profile-wrap" id="profileWrap">
            <button class="profile-btn" type="button" id="profileToggle" aria-expanded="false">
              <span class="avatar">BD</span>
              <span class="profile-meta">
                <strong>Biodelice Admin</strong>
                <span>Nutrition ops</span>
              </span>
              <span>▾</span>
            </button>

            <div class="profile-menu">
              <a href="{% url 'admin:index' %}">Open Django admin</a>
              <a href="{% url 'accounts:settings' %}">Profile settings</a>
              <a href="{% url 'accounts:logout' %}">Sign out</a>
            </div>
          </div>
        </div>
      </div>

      {% if messages %}
        <div class="message-stack">
          {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      {% block admin_content %}{% endblock %}
    </main>
  </div>

  <script>
    (function () {
      const wrap = document.getElementById('profileWrap');
      const toggle = document.getElementById('profileToggle');
      if (wrap && toggle) {
        toggle.addEventListener('click', function () {
          const isOpen = wrap.classList.toggle('open');
          toggle.setAttribute('aria-expanded', String(isOpen));
        });
        document.addEventListener('click', function (event) {
          if (!wrap.contains(event.target)) {
            wrap.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
          }
        });
      }

      document.querySelectorAll('[data-modal-open]').forEach(function (button) {
        button.addEventListener('click', function () {
          const target = document.querySelector(button.getAttribute('data-modal-open'));
          if (target) target.classList.add('show');
        });
      });

      document.querySelectorAll('[data-modal-close]').forEach(function (button) {
        button.addEventListener('click', function () {
          const target = button.closest('.modal');
          if (target) target.classList.remove('show');
        });
      });

      document.querySelectorAll('.modal').forEach(function (modal) {
        modal.addEventListener('click', function (event) {
          if (event.target === modal) modal.classList.remove('show');
        });
      });

      const currentSection = document.body.getAttribute('data-admin-section');
      if (currentSection) {
        document.querySelectorAll('.sidebar-link[data-section]').forEach(function (link) {
          link.classList.toggle('active', link.getAttribute('data-section') === currentSection);
        });
      }
    })();
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
