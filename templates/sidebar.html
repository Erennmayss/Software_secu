<aside class="sidebar-shell">
  <style>
    .sidebar-shell {
      padding: 24px 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 249, 243, 0.92));
      border-right: 1px solid rgba(234, 223, 206, 0.95);
      min-height: 100vh;
      position: sticky;
      top: 0;
    }

    .brand {
      display: block;
      margin-bottom: 24px;
      padding: 8px 10px 18px;
      text-decoration: none;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #22313d;
    }

    .brand span { color: var(--accent); }

    .nav-stack {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 16px;
      color: #53616d;
      text-decoration: none;
      font-weight: 500;
      transition: all .18s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      background: rgba(232, 98, 26, 0.1);
      color: var(--accent);
      transform: translateX(2px);
    }

    .health-box {
      margin-top: 22px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(232, 98, 26, 0.1), rgba(255, 197, 152, 0.22));
      border: 1px solid rgba(232, 98, 26, 0.15);
    }

    .health-box h4 {
      margin: 0 0 12px;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9e582f;
    }

    .health-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 8px 8px 0;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #4a5965;
      font-size: 0.75rem;
    }

    @media (max-width: 980px) {
      .sidebar-shell {
        min-height: auto;
        position: static;
        padding: 14px 18px;
      }

      .brand {
        margin-bottom: 10px;
      }

      .nav-stack {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .nav-link {
        justify-content: center;
        text-align: center;
        font-size: 0.8rem;
      }

      .health-box {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .nav-stack {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <a class="brand" href="{% url 'recipes:index' %}">Bio<span>delice</span></a>

  <nav class="nav-stack">
    <a class="nav-link {% if request.resolver_match.url_name == 'index' or request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'recipes:index' %}">
      <span>Recommandé</span>
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'regime' %}active{% endif %}" href="{% url 'recipes:regime' %}">
      <span>Mon Régime Adapté</span>
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'planner' %}active{% endif %}" href="{% url 'recipes:planner' %}">
      <span>Meal Planner</span>
    </a>
  </nav>

  <div class="health-box">
    <h4>Contraintes actives</h4>
    {% for c in request.user.health_constraints.all %}
      <span class="health-pill">{{ c.name|title }}</span>
    {% empty %}
      <span class="health-pill">Aucune</span>
    {% endfor %}
  </div>
</aside>
