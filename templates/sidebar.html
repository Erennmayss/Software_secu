<style>
.sidebar{
  position:fixed;top:0;left:0;width:250px;height:100vh;z-index:150;
  background:var(--g1);
  border-right:1px solid rgba(255,255,255,0.05);
  display:flex;flex-direction:column; padding:28px 0;
  overflow-y:auto;
}
.logo{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:600;color:#fff;padding:0 24px;margin-bottom:36px;}
.logo span{color:var(--o1)}
.nav-section{font-size:0.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:0 24px;margin-bottom:10px;margin-top:24px}
.nav-links{list-style:none;display:flex;flex-direction:column;gap:2px;padding:0 12px}
.nav-links a{display:flex;align-items:center;gap:12px;padding:11px 14px;color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.84rem;border-radius:10px;transition:all 0.18s;}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,0.05)}
.nav-links a.active{background:rgba(232,98,26,0.18);color:var(--o2);font-weight:500}
.nav-links a svg{width:18px;height:18px;opacity:.75}
.health-card{margin:20px 12px 0;background:linear-gradient(135deg,rgba(232,98,26,0.15),rgba(232,98,26,0.05));border:1px solid rgba(232,98,26,0.2);border-radius:var(--radius);padding:16px;}
.health-card-title{font-size:0.72rem;font-weight:600;text-transform:uppercase;color:var(--o3);margin-bottom:12px}
.c-badge{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;font-size:0.73rem;background:rgba(255,255,255,0.07);color:#fff;border:1px solid rgba(255,255,255,0.1);margin-bottom:6px;}
</style>

<aside class="sidebar">
  <div class="logo">Bio<span>delice</span></div>
  
  <p class="nav-section">Navigation</p>
  <ul class="nav-links">
    <li>
      <a href="{% url 'recipes:index' %}" class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Recommandé
      </a>
    </li>
    <li>
      <a href="{% url 'recipes:regime' %}" class="{% if request.resolver_match.url_name == 'regime' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Mon Régime Adapté
      </a>
    </li>
    <li>
      <a href="{% url 'recipes:planner' %}" class="{% if request.resolver_match.url_name == 'planner' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Meal Planner
      </a>
    </li>
    <li>
      <a href="{% url 'accounts:settings' %}" class="{% if request.resolver_match.url_name == 'settings' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Paramètres
      </a>
    </li>
  </ul>

  <p class="nav-section">Mon profil santé</p>
  <div class="health-card">
    <div class="health-card-title">Contraintes actives</div>
    {% for c in request.user.health_constraints.all %}
      <div class="c-badge">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--o1);"></span>
        {{ c.name|title }}
        <span style="margin-left:auto;font-size:10px;opacity:0.6;">✓</span>
      </div>
    {% empty %}
      <div style="font-size:0.7rem;color:var(--muted)">Aucune contrainte</div>
    {% endfor %}
  </div>
</aside>
