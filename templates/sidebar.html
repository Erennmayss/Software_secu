<aside class="sidebar-shell">
  <style>
    .sidebar-shell {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar-width);
      padding: 24px 18px;
      background: rgba(15, 34, 23, 0.92);
      backdrop-filter: blur(18px);
      border-right: 1px solid var(--line);
      box-shadow: 0 14px 40px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 40;
    }

    .brand {
      display: block;
      padding: 6px 10px 8px;
      text-decoration: none;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #fff;
    }

    .brand span { color: var(--accent); }

    .sidebar-subtitle {
      color: var(--muted);
      font-size: 0.82rem;
      padding: 0 10px;
      margin-top: -12px;
    }

    .nav-stack {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      font-weight: 500;
      border: 1px solid transparent;
      transition: all .18s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      background: linear-gradient(135deg, rgba(232,98,26,0.18), rgba(255,255,255,0.04));
      color: #fff;
      border-color: rgba(232,98,26,0.22);
      transform: translateX(3px);
    }

    .nav-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .health-box {
      margin-top: auto;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(232,98,26,0.14), rgba(255,255,255,0.04));
      border: 1px solid rgba(232,98,26,0.16);
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
    }

    .health-box h4 {
      margin: 0 0 12px;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #ffb48a;
    }

    .health-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 8px 8px 0;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f4f6f3;
      font-size: 0.75rem;
    }

    body.light-mode .sidebar-shell {
      background: rgba(255,250,245,0.92);
      box-shadow: 0 18px 40px rgba(49,34,18,0.08);
    }

    body.light-mode .brand { color: var(--text); }
    body.light-mode .nav-link { color: #53616d; }
    body.light-mode .nav-link:hover,
    body.light-mode .nav-link.active { color: var(--text); background: var(--accent-soft); }
    body.light-mode .nav-icon,
    body.light-mode .health-pill { background: #fff; color: var(--text); border-color: var(--line); }
    body.light-mode .health-box h4 { color: #9e582f; }

    @media (max-width: 980px) {
      .sidebar-shell {
        position: static;
        width: 100%;
        min-height: auto;
        padding: 14px 18px;
      }

      .brand {
        margin-bottom: 8px;
      }

      .nav-stack {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .nav-link {
        justify-content: center;
        text-align: center;
        font-size: 0.8rem;
      }

      .nav-link span:last-child {
        display: none;
      }

      .health-box {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .nav-stack {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>

  <a class="brand" href="{% url 'recipes:index' %}">Bio<span>delice</span></a>
  <div class="sidebar-subtitle">Cuisine, adaptation et organisation au même endroit</div>

  <nav class="nav-stack">
    <a class="nav-link {% if request.resolver_match.url_name == 'index' or request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'recipes:index' %}">
      <span class="nav-icon">⌂</span>
      <span>Home</span>
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'regime' %}active{% endif %}" href="{% url 'recipes:regime' %}">
      <span class="nav-icon">◌</span>
      <span>Régime adapté</span>
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'planner' %}active{% endif %}" href="{% url 'recipes:planner' %}">
      <span class="nav-icon">☷</span>
      <span>Meal planner</span>
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}" href="{% url 'accounts:settings' %}">
      <span class="nav-icon">⚙</span>
      <span>Settings</span>
    </a>
  </nav>

  <div class="health-box" id="sidebarHealthBox">
    <h4>Contraintes actives</h4>
    {% for c in request.user.health_constraints.all %}
      <span class="health-pill">{{ c.name|title }}</span>
    {% endfor %}
  </div>
</aside>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const box = document.getElementById('sidebarHealthBox');
    if (!box) return;
    
    const restrictionsStr = "{{ request.user.restrictions|default:''|escapejs }}";
    
    if (restrictionsStr) {
      restrictionsStr.split(',').forEach(r => {
        r = r.trim();
        if (r && r !== 'aucune') {
          const span = document.createElement('span');
          span.className = 'health-pill';
          // Convertit "sans_gluten" en "Sans gluten"
          span.textContent = r.replace(/_/g, ' ').replace(/^./, l => l.toUpperCase());
          box.appendChild(span);
        }
      });
    }
    
    // Si aucune contrainte n'est active, on affiche "Aucune"
    if (box.querySelectorAll('.health-pill').length === 0) {
      const span = document.createElement('span');
      span.className = 'health-pill';
      span.textContent = 'Aucune';
      box.appendChild(span);
    }
  });
</script>
